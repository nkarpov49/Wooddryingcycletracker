<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверка обработанных строк Google Sheets</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
      background: #f5f5f5;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    button {
      padding: 12px 24px;
      background: #0070f3;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #0051cc; }
    button.danger {
      background: #e00;
    }
    button.danger:hover { background: #c00; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
      font-size: 16px;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #0070f3;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th {
      background: #f8f8f8;
      font-weight: 600;
      color: #333;
    }
    tr:hover { background: #f8f8f8; }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status.processed {
      background: #d4edda;
      color: #155724;
    }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .date {
      color: #666;
      font-size: 13px;
    }
    .details {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }
    .error {
      background: #fee;
      border: 1px solid #fcc;
      padding: 15px;
      border-radius: 8px;
      color: #c00;
      margin-bottom: 20px;
    }
    .success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      padding: 15px;
      border-radius: 8px;
      color: #155724;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Обработанные строки Google Sheets</h1>
    <div class="subtitle">Просмотр и управление статусом обработанных строк из таблицы</div>
    
    <div class="actions">
      <button onclick="loadProcessedRows()">🔄 Обновить</button>
      <button class="danger" onclick="clearAllProcessed()">🗑️ Очистить все</button>
    </div>

    <div id="message"></div>
    <div id="content"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zzteuolgibfbulqdavof.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dGV1b2xnaWJmYnVscWRhdm9mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzg1MTAzNzIsImV4cCI6MjA1NDA4NjM3Mn0.a8rKiCPAACqL_8_wPtFZXGq_LOoL-j0w_bvvfKe7P_4';

    function showLoading() {
      document.getElementById('content').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          Загрузка данных...
        </div>
      `;
    }

    function showError(msg) {
      document.getElementById('message').innerHTML = `<div class="error">❌ ${msg}</div>`;
      setTimeout(() => {
        document.getElementById('message').innerHTML = '';
      }, 5000);
    }

    function showSuccess(msg) {
      document.getElementById('message').innerHTML = `<div class="success">✅ ${msg}</div>`;
      setTimeout(() => {
        document.getElementById('message').innerHTML = '';
      }, 5000);
    }

    async function loadProcessedRows() {
      showLoading();
      
      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/make-server-c5bcdb1f/sheets/processed-rows`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        displayProcessedRows(data.rows || []);
      } catch (error) {
        console.error('Error:', error);
        showError(`Ошибка загрузки: ${error.message}`);
        document.getElementById('content').innerHTML = '';
      }
    }

    function displayProcessedRows(rows) {
      if (rows.length === 0) {
        document.getElementById('content').innerHTML = `
          <div class="empty">
            <div class="empty-icon">📭</div>
            <p>Нет обработанных строк</p>
          </div>
        `;
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>Строка #</th>
              <th>Камера</th>
              <th>Старый цикл</th>
              <th>Новый цикл</th>
              <th>Порода</th>
              <th>Обработано</th>
              <th>Статус</th>
            </tr>
          </thead>
          <tbody>
      `;

      rows.forEach(row => {
        const date = new Date(row.processedAt);
        const dateStr = date.toLocaleString('ru-RU', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });

        html += `
          <tr>
            <td><strong>#${row.rowNumber}</strong></td>
            <td>${row.details?.chamberNumber || '-'}</td>
            <td>${row.details?.oldSequentialNumber || '-'}</td>
            <td>${row.details?.newSequentialNumber || '-'}</td>
            <td>${row.details?.woodTypeLithuanian || '-'}</td>
            <td class="date">${dateStr}</td>
            <td><span class="status processed">Обработана</span></td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      document.getElementById('content').innerHTML = html;
    }

    async function clearAllProcessed() {
      if (!confirm('⚠️ Вы уверены? Это удалит информацию о всех обработанных строках!')) {
        return;
      }

      try {
        const response = await fetch(`${SUPABASE_URL}/functions/v1/make-server-c5bcdb1f/sheets/clear-processed`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        showSuccess(data.message || 'Все строки очищены');
        loadProcessedRows();
      } catch (error) {
        console.error('Error:', error);
        showError(`Ошибка: ${error.message}`);
      }
    }

    // Загрузка при открытии страницы
    loadProcessedRows();
  </script>
</body>
</html>
